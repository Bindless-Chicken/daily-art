name: Generate Daily Challenge

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run generate:challenge
      - name: Commit generated challenge
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate daily challenge"
          file_pattern: public/challenges.json
